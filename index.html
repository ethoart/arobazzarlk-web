    <!-- Default Favicon Placeholder -->
    <link id="dynamic-favicon" rel="icon" href="https://raw.githubusercontent.com/ethoart/arobazzar-img/main/favicona.png">
    
    <!-- IMMEDIATE FAVICON RESTORE -->
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('arobazzar_settings');
          if (saved) {
            var s = JSON.parse(saved);
            if (s.siteFavicon && s.siteFavicon.length > 5) {
              var link = document.getElementById('dynamic-favicon');
              if (link) link.href = s.siteFavicon;
            }
          }
        } catch(e) { console.error('Favicon restore error:', e); }
      })();
    </script>
    
    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
      // Polyfill for process.env
      window.process = {

          REACT_APP_API_URL: '/api',
          API_KEY: ''
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              'sans': ['Inter', 'sans-serif'],
              'display': ['Space Grotesk', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'scale-in': 'scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'float': 'float 6s ease-in-out infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'loading-progress': 'loadingProgress 2s ease-in-out infinite',
            },
            keyframes: {
              'fadeIn': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'slideUp': {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              'scaleIn': {
                '0%': { opacity: '0', transform: 'scale(0.9)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              'loadingProgress': {
                '0%': { transform: 'scaleX(0)', transformOrigin: 'left' },
                '45%': { transform: 'scaleX(1)', transformOrigin: 'left' },
                '50%': { transform: 'scaleX(1)', transformOrigin: 'right' },
                '100%': { transform: 'scaleX(0)', transformOrigin: 'right' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Strictly enforce fonts to prevent FOUT (Flash of Unstyled Text) */
      :root {
        --font-sans: 'Inter', sans-serif;
        --font-display: 'Space Grotesk', sans-serif;
      }
      
      body { 
        font-family: var(--font-sans); 
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      
      h1, h2, h3, h4, h5, h6, .font-display { 
        font-family: var(--font-display); 
      }
      
      /* Ensure font-display: swap behavior for performance */
      @font-face {
        font-family: 'Inter';
        font-display: swap;
      }
      
      @font-face {
        font-family: 'Space Grotesk';
        font-display: swap;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
      
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Will-change optimization helper */
      .will-change-transform { will-change: transform; }
      
      /* Image Loading Performance Improvements */
      .shimmer {
        background: linear-gradient(to right, #f6f7f8 8%, #edeef1 18%, #f6f7f8 33%);
        background-size: 2000px 100%;
        animation: shimmer 2s infinite linear;
      }
      @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }
    </style>
